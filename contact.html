<form id="contactForm" action="mailto:sarious6@gmail.com" method="post">

        <div id="myContact">

        </article>

        </div>
        <div class="formRow">
            <lable for="extraInfo">Message</lable>
            <textarea name="extInfo" id="extraInfo" placeholder="Leave a short message for me here." type="text"></textarea>
        </div>
    </fieldset>

    <div id="buttons">
        <input type="submit" value="Submit" />
        <input type="reset" value="Cancel" />
    </div>
</form>
